version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - ENV=dev
      - JWT_SECRET=change-me
      - ASR_PROVIDER=deepgram
      - TTS_PROVIDER=deepgram
      - LLM_PROVIDER=deepseek
      - DEEPSEEK_API_KEY=REPLACE_WITH_DEEPSEEK_API_KEY
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - DEEPSEEK_MODEL=deepseek-v4-flash
      - DEEPGRAM_API_KEY=REPLACE_WITH_DEEPGRAM_API_KEY
      - DEEPGRAM_BASE_URL=https://api.deepgram.com/v1/listen
      - DEEPGRAM_MODEL=nova-3
      - DEEPGRAM_TTS_BASE_URL=https://api.deepgram.com/v1/speak
      - DEEPGRAM_TTS_MODEL=aura-2-thalia-en
      - DEEPGRAM_TTS_SAMPLE_RATE=24000
      - ALIBABA_ACCESS_KEY_ID=REPLACE_WITH_ALIBABA_ACCESS_KEY_ID
      - ALIBABA_ACCESS_KEY_SECRET=REPLACE_WITH_ALIBABA_ACCESS_KEY_SECRET
      - ALIBABA_APP_KEY=REPLACE_WITH_ALIBABA_APP_KEY
      - ALIBABA_REGION=cn-shanghai
      - ALIBABA_ASR_BASE_URL=https://nls-gateway-cn-shanghai.aliyuncs.com/stream/v1/asr
      - ALIBABA_TOKEN_BASE_URL=https://nls-meta.cn-shanghai.aliyuncs.com/
      - ALIBABA_SAMPLE_RATE=16000
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=english_tutor
      - POSTGRES_USER=tutor
      - POSTGRES_PASSWORD=tutor
    ports:
      - "5432:5432"
