version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      - ENV=dev
      - JWT_SECRET=change-me
      - ASR_PROVIDER=deepgram
      - TTS_PROVIDER=elevenlabs
      - LLM_PROVIDER=openai
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=english_tutor
      - POSTGRES_USER=tutor
      - POSTGRES_PASSWORD=tutor
    ports:
      - "5432:5432"
